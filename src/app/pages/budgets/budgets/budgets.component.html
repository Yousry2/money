<table mat-table [dataSource]="dataSource" class="mat-elevation-z8 main-table">

    <!--- Note that these columns can be defined in any order.
          The actual rendered columns are set as a property on the row definition" -->
  
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef> Id </th>
      <td mat-cell *matCellDef="let element"> {{element.id}} </td>
    </ng-container>

    <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef> Name </th>
        <td mat-cell *matCellDef="let element"> {{element.name}} </td>
      </ng-container>
  
    <ng-container matColumnDef="first_month">
      <th mat-header-cell *matHeaderCellDef> First Month </th>
      <td mat-cell *matCellDef="let element"> {{element.first_month}} </td>
    </ng-container>
  
    <ng-container matColumnDef="last_month">
      <th mat-header-cell *matHeaderCellDef> Last Month </th>
      <td mat-cell *matCellDef="let element"> {{element.last_month}} </td>
    </ng-container>
  
 
  
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
